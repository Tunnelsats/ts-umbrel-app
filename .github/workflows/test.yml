name: TDD Docker Tests

on:
  push:
    branches: [ "master", "feat/*", "feature-parity" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Generate Dummy Wireguard Keypair
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard-tools
          wg genkey | tee privatekey | wg pubkey > publickey
          wg genpsk > presharedkey
          cat <<EOF > data/tunnelsats-dev.conf
          [Interface]
          PrivateKey = $(cat privatekey)
          Address = 10.9.0.2/24

          [Peer]
          PublicKey = $(cat publickey)
          PresharedKey = $(cat presharedkey)
          Endpoint = 192.0.2.1:51820
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
          EOF

      - name: Start Mock Umbrel Compose
        run: docker compose -f docker-compose.test.yml up -d

      - name: Verify Entrypoint Logic (Remote CI)
        run: |
          chmod +x scripts/test.sh
          ./scripts/test.sh entrypoint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Image Tag
        id: image_tag
        run: |
          echo "IMAGE=$(grep -E 'image: tunnelsats/ts-umbrel-app' docker-compose.yml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Build Docker Image with Cache
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ steps.image_tag.outputs.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Tunnelsats
        run: docker compose up -d tunnelsats

      - name: Assert Container Starts Successfully
        run: |
          sleep 10
          docker logs tunnelsats
          if ! docker logs tunnelsats 2>&1 | grep -q "Starting internal dashboard"; then
            echo "ERROR: Tunnelsats entrypoint failed to start the dashboard server."
            exit 1
          fi
          if docker logs tunnelsats | grep -q "Tunnelsats container running"; then
             echo "Container started successfully."
          fi

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements-test.txt

      - name: Run Pytest
        env:
          PYTHONPATH: ./server
        run: |
          pytest server/tests/

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install JS dependencies
        working-directory: ./web
        run: npm install

      - name: Run Jest
        working-directory: ./web
        run: npm test
