name: TDD Docker Tests

on:
  push:
    branches: [ "main", "feat/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Dummy Wireguard Keypair
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard-tools
          wg genkey | tee privatekey | wg pubkey > publickey
          wg genpsk > presharedkey
          cat <<EOF > data/tunnelsats-dev.conf
          [Interface]
          PrivateKey = $(cat privatekey)
          Address = 10.9.0.2/24

          [Peer]
          PublicKey = $(cat publickey)
          PresharedKey = $(cat presharedkey)
          Endpoint = 192.0.2.1:51820
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
          EOF

      - name: Start Mock Umbrel Compose
        run: docker compose -f docker-compose.test.yml up -d

      - name: Build and Start Tunnelsats
        run: |
          docker compose build tunnelsats
          docker compose up -d tunnelsats

      - name: Assert Target Container Recognition
        run: |
          sleep 10
          docker logs tunnelsats
          if ! docker logs tunnelsats | grep -q "Applying killswitch and routing for container IP:"; then
            echo "ERROR: Tunnelsats failed to engage the killswitch or wg-quick failed."
            exit 1
          fi
          if docker logs tunnelsats | grep -q "Tunnelsats is running and protecting target IPs"; then
             echo "Killswitch engaged successfully."
          fi

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements-test.txt

      - name: Run Pytest
        env:
          PYTHONPATH: ./server
        run: |
          pytest server/tests/

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install JS dependencies
        working-directory: ./web
        run: npm install

      - name: Run Jest
        working-directory: ./web
        run: npm test
