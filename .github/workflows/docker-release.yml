name: Docker Build & Push

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.0

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        # Only login if it's not a PR in order to avoid pushing from forks
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version
        id: extract_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep "^version: " tunnelsats/umbrel-app.yml | sed -E 's/version: "?([^" ]+)"?.*/\1/' | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from tunnelsats/umbrel-app.yml"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "MAJOR_MINOR=$MAJOR_MINOR" >> $GITHUB_OUTPUT
          
          if RELEASE_OUT=$(gh release view "v${VERSION}" 2>&1); then
            echo "IS_NEW_VERSION=false" >> $GITHUB_OUTPUT
          elif echo "$RELEASE_OUT" | grep -q "release not found\|Could not resolve"; then
            echo "IS_NEW_VERSION=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Failed to query GitHub releases (API error or rate limit). Aborting to avoid overwriting existing tags."
            exit 1
          fi

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: tunnelsats/ts-umbrel-app
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.extract_version.outputs.VERSION }},enable=${{ steps.extract_version.outputs.IS_NEW_VERSION == 'true' }}
            type=raw,value=${{ steps.extract_version.outputs.MAJOR_MINOR }},enable=${{ steps.extract_version.outputs.IS_NEW_VERSION == 'true' }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          # Only push on master or tag, do test builds on PR
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.extract_version.outputs.IS_NEW_VERSION == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          echo "Creating new release v${VERSION}..."
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --target ${{ github.sha }} \
            --generate-notes || {
              if gh release view "v${VERSION}" >/dev/null 2>&1; then
                echo "Release v${VERSION} already exists, skipping."
              else
                exit 1
              fi
            }
