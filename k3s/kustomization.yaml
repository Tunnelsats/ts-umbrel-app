apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Override at apply-time with `kubectl apply -k k3s/ --namespace=<ns>` or by
# adding `namespace: <your-namespace>` here. Kustomize will rewrite the
# namespace of all generated resources AND the ServiceAccount subject of the
# RoleBinding, so you do not have to edit rolebinding.yaml by hand.
# namespace: default

resources:
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
