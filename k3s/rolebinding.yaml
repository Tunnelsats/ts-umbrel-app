apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tunnelsats
  # This RoleBinding lives in the LND/CLN namespace and grants the
  # tunnelsats ServiceAccount (which may reside elsewhere) pod
  # get/list/delete rights ONLY in this namespace.
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tunnelsats
subjects:
  - kind: ServiceAccount
    name: tunnelsats
    namespace: default         # namespace where the tunnelsats ServiceAccount is deployed
