metadata:
  name: tunnelsats
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tunnelsats
subjects:
  - kind: ServiceAccount
    name: tunnelsats
    namespace: default         # adjust to the namespace where tunnelsats is deployed
