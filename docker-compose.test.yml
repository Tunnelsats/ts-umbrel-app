version: '3.7'
services:
  mock-lnd:
    image: alpine:latest
    container_name: mock_lightning_lnd_1
    command: ["sh", "-c", "apk add --no-cache netcat-openbsd && nc -l -p 9735 -s 0.0.0.0 & while true; do sleep 3600; done"]
    ports:
      - "9735:9735"

  mock-cln:
    image: alpine:latest
    container_name: mock_lightning_core-lightning_1
    command: ["sh", "-c", "apk add --no-cache netcat-openbsd && nc -l -p 9736 -s 0.0.0.0 & while true; do sleep 3600; done"]
    ports:
      - "9736:9736"

  tunnelsats:
    build: .
    image: tunnelsats/ts-umbrel-app:v3.1.0
    container_name: tunnelsats
    restart: on-failure
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./data:/data
      - ./data/mock-lnd:/lightning-data/lnd
      - ./data/mock-cln:/lightning-data/cln
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - mock-lnd
      - mock-cln
