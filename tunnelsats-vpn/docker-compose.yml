version: "3.7"

services:
  tunnelsats:
    image: tunnelsats/ts-umbrel-app:v3.1.0
    container_name: tunnelsats
    restart: on-failure
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${APP_DATA_DIR}:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
