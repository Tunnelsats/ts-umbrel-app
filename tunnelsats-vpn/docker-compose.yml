version: "3.7"

services:
  tunnelsats:
    image: hakuna1337/umbrel-tunnelsats:v3.0.0
    container_name: tunnelsats
    restart: on-failure
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${APP_DATA_DIR}:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
